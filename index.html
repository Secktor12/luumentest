    <style>
        html,
        body {
            height: 100vh;
            width: 100%;
            overflow: hidden !important;
            margin: 0;
            padding: 0;
            background: #050505;
        }

        .aspect-container {
            height: 100vh;
            width: 100%;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Change from justify-between to start */
            align-items: center;

            padding: 0.5rem 0 1rem 0; /* Menos padding en móvil */
        }

        @media (min-width: 1024px) {
            .aspect-container {
                padding: 1rem 0 2rem 0;
            }
        }

        /* Particles */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, #FCF6BA 0%, #D4AF37 50%, transparent 100%);
            border-radius: 50%;
            filter: blur(1px);
            opacity: 0;
        }

        .cards-swiper {
            transform: translateZ(0);
            backface-visibility: hidden;
            perspective: 1000px;
        }

        .card-glow-enhanced video {
            will-change: transform;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* Card Glow Enhancements */
        .card-glow-enhanced {
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.45), inset 0 0 30px rgba(212, 175, 55, 0.2) !important;
            transition: box-shadow 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s ease;
        }

        .swiper-slide.group:hover .card-glow-enhanced,
        .swiper-slide-active .card-glow-enhanced {
            box-shadow: 0 0 120px rgba(212, 175, 55, 0.85), 0 0 40px rgba(212, 175, 55, 0.6), inset 0 0 50px rgba(212, 175, 55, 0.5) !important;
        }

        /* Enhanced Shimmer Layer */
        .shimmer-layer {
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.1) 20%,
                    rgba(255, 255, 255, 0.5) 50%,
                    rgba(212, 175, 55, 0.4) 80%,
                    transparent 100%);
            background-size: 200% 100%;
        }

        /* Logo Glow */
        .logo-glow {
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.8)) drop-shadow(0 0 30px rgba(212, 175, 55, 0.4));
        }

        /* Mute Button Styles */
        .mute-btn-container {
            position: absolute;
            bottom: 25px;
            /* Adjust according to layout, floating above swiper pagination */
            right: 20px;
            z-index: 100;
        }

        .mute-btn {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .mute-btn:hover {
            border-color: rgba(212, 175, 55, 0.8);
            color: #D4AF37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            transform: scale(1.05);
        }

        /* Scrollbar para el modal */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            display: block;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {

            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(212, 175, 55, 0.6);
        }
    </style>
</head>

    <script>
        document.documentElement.classList.add('dark');

        // Audio/Mute Implementation
        const muteBtn = document.getElementById('global-mute-btn');
        const masterAudio = new Audio();
        let loopStart = 0;
        let loopDuration = 6;
        let isMuted = true;

        masterAudio.addEventListener('timeupdate', () => {
            if (loopDuration > 0) {
                if (masterAudio.currentTime >= loopStart + loopDuration) {
                    masterAudio.currentTime = loopStart;
                }
            }
        });

        function toggleMute() {
            isMuted = !isMuted;
            masterAudio.muted = isMuted;
            updateVideoAudioState();
            
            const icon = document.getElementById('mute-icon');
            if (icon) {
                icon.textContent = isMuted ? 'volume_off' : 'volume_up';
                if (!isMuted) {
                    icon.classList.add('text-primary');
                    icon.classList.remove('text-gray-500');
                } else {
                    icon.classList.remove('text-primary');
                    icon.classList.add('text-gray-500');
                }
            }
        }

        if (muteBtn) {
            muteBtn.addEventListener('click', toggleMute);
        }

        function preloadAudios() {
            // Desactivado temporalmente
        }

        // --- ANALYTICS TRACKING ---
        let currentActiveSlideId = null;
        let lastSlideStartTime = Date.now();

        async function logView(cardId, duration = 0) {
            try {
                await fetch('api/log_view.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uuid: userUUID, card_id: cardId, duration: duration })
                });
            } catch (e) { }
        }

        let nextAudioPreloader = new Audio();
        function preloadNextAudio() {
            const nextSlide = document.querySelector('.cards-swiper .swiper-slide-next');
            if (nextSlide) {
                const nextCardId = nextSlide.querySelector('button[data-cardid]')?.getAttribute('data-cardid');
                const nextCard = currentCards.find(c => c.id == nextCardId);
                if (nextCard && nextCard.audio_url) {
                    nextAudioPreloader.src = nextCard.audio_url;
                    nextAudioPreloader.load(); // Silent preload in background
                }
            }
        }

        function updateVideoAudioState() {
            const activeSlide = document.querySelector('.cards-swiper .swiper-slide-active');
            if (!activeSlide) return;

            // Manage Preloads for Videos (Lazy Loading style)
            const prevSlide = document.querySelector('.cards-swiper .swiper-slide-prev');
            const nextSlide = document.querySelector('.cards-swiper .swiper-slide-next');
            
            document.querySelectorAll('.cards-swiper video').forEach(v => {
                const parent = v.closest('.swiper-slide');
                if (parent === activeSlide || parent === prevSlide || parent === nextSlide) {
                    if (v.preload !== 'auto') v.preload = 'auto'; // Prioritize visible/nearby downloads
                } else {
                    v.preload = 'none'; // Save bandwidth for others
                    if (!v.paused) v.pause();
                }
            });

            const newActiveCardId = activeSlide.querySelector('button[data-cardid]')?.getAttribute('data-cardid');
            if (currentActiveSlideId && currentActiveSlideId !== newActiveCardId) {
                const now = Date.now();
                const durationSeconds = Math.round((now - lastSlideStartTime) / 1000);
                if (durationSeconds > 0) logView(currentActiveSlideId, durationSeconds);
                lastSlideStartTime = now;
            } else if (!currentActiveSlideId && newActiveCardId) {
                logView(newActiveCardId, 0);
                lastSlideStartTime = Date.now();
            }
            currentActiveSlideId = newActiveCardId;

            // --- 1. LÓGICA DE AUDIO (MIXING) ---
            const currentCard = currentCards.find(c => c.id == currentActiveSlideId);
            if (currentCard && !isMuted && currentCard.audio_url) {
                const musicPath = currentCard.audio_url;
                const mVol = currentCard.music_volume !== null ? parseFloat(currentCard.music_volume) : 1.0;
                
                loopStart = parseFloat(currentCard.audio_start || 0);
                loopDuration = parseFloat(currentCard.audio_duration || 6);

                if (masterAudio.getAttribute('data-active-src') !== musicPath) {
                    masterAudio.src = musicPath;
                    masterAudio.setAttribute('data-active-src', musicPath);
                    masterAudio.currentTime = loopStart;
                }
                
                masterAudio.volume = mVol;
                if (masterAudio.paused) masterAudio.play().catch(e => {});
            } else {
                masterAudio.pause();
                masterAudio.removeAttribute('data-active-src');
            }

            // --- 2. LÓGICA DE VIDEO ---
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            const isSaveData = conn ? (conn.saveData || (conn.effectiveType && (conn.effectiveType === '2g' || conn.effectiveType === '3g'))) : false;

            let playingSlides = [activeSlide];
            if (!isSaveData) {
                playingSlides.push(
                    document.querySelector('.cards-swiper .swiper-slide-prev'),
                    document.querySelector('.cards-swiper .swiper-slide-next')
                );
            }

            playingSlides = playingSlides.filter(Boolean);
            document.querySelectorAll('.cards-swiper video').forEach(v => {
                const parentSlide = v.closest('.swiper-slide');
                const isPlaying = playingSlides.includes(parentSlide);
                const isActive = parentSlide === activeSlide;

                if (isPlaying) {
                    if (v.paused) v.play().catch(e => { });
                    
                    // Solo activar audio para el activo si no está muteado globalmente
                    if (isActive && !isMuted && currentCard) {
                        const videoVol = currentCard.video_volume !== null ? parseFloat(currentCard.video_volume) : 1.0;
                        v.muted = false;
                        v.volume = videoVol;
                        v.currentTime = 0; // Better sync
                    } else {
                        v.muted = true;
                        v.volume = 0;
                    }
                } else {
                    if (!v.paused) v.pause();
                    v.muted = true;
                    v.volume = 0;
                }
            });

            // Preload next audio for gapless experience
            preloadNextAudio();
        }

        function initSwiper() {
            cardsSwiper = new Swiper('.cards-swiper', {
                direction: 'vertical',

                centeredSlides: true,
                slidesPerView: 'auto',
                loop: true,
                loopedSlides: 12, // Mazo mas denso

                speed: 600,

                touchStartPreventDefault: false,
                mousewheel: true,
                on: {
                    init: function () {
                        preloadAudios();
                        setTimeout(updateVideoAudioState, 50);
                    },
                    slideChange: function () {
                        updateVideoAudioState();
                        // Actualizar comentarios para la carta activa
                        const activeSlide = this.slides[this.activeIndex];
                        const cardId = activeSlide.getAttribute('data-cardid');
                        if (cardId && cardId !== currentlySelectedCardId) {
                            currentlySelectedCardId = cardId;
                            fetchComments(cardId);
                        }
                    },
                    setTranslate: function () {
                        const swiper = this;
                        const centerAbs = swiper.height / 2;
                        let closestSlide = null;
                        let minDistance = Infinity;

                        swiper.slides.forEach((slide) => {
                            const slideRect = slide.getBoundingClientRect();
                            const swiperRect = swiper.el.getBoundingClientRect();
                            const slideCenter = slideRect.top - swiperRect.top + (slideRect.height / 2);
                            const distance = Math.abs(centerAbs - slideCenter);
                            if (distance < minDistance) {
                                minDistance = distance;
                                closestSlide = slide;
                            }
                        });


                        if (closestSlide) {
                            const newAudioSrc = closestSlide.getAttribute('data-audio');
                            if (newAudioSrc) {
                                const currentSrcFile = masterAudio.src.split('/').pop();
                                const newSrcFile = newAudioSrc.split('/').pop();
                                if (currentSrcFile !== newSrcFile) {
                                    masterAudio.src = newAudioSrc;
                                    if (!isMuted) masterAudio.play().catch(e => { });
                                }
                            }
                        }
                    }
                },
                coverflowEffect: {
                    rotate: 0,
                    stretch: -460, // Súper compacto, efecto "mazo grueso"
                    depth: 80,
                    modifier: 1.5,
                    slideShadows: true,
                }
            });
        }

        const supportedLangs = ['es', 'en', 'fr', 'de', 'zh'];
        let currentLang = 'es';

        function initLanguage() {
            // Get browser language (e.g., 'es-MX' -> 'es')
            const browserLang = (navigator.language || navigator.userLanguage).split('-')[0].toLowerCase();

            // Check if standard browser language is supported, otherwise default to 'es'
            currentLang = supportedLangs.includes(browserLang) ? browserLang : 'es';

            applyTranslations(currentLang);
        }

        function changeLanguage(langCode) {
            if (supportedLangs.includes(langCode)) {
                currentLang = langCode;
                applyTranslations(currentLang);
            }
        }

        function applyTranslations(lang) {
            // Update UI selector
            document.getElementById('current-lang-text').innerText = lang;

            // Apply text translations using data-i18n attributes
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.innerText = translations[lang][key];
                }
            });

            // Handle special cases (placeholder)
            const emailInput = document.getElementById('email-input');
            if (emailInput && translations[lang]['email_placeholder']) {
                emailInput.placeholder = translations[lang]['email_placeholder'];
            }
        }

        // --- DEVTOOLS PROTECTION ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; // F12
            if(e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) return false; // Ctrl+Shift+I, J, C
            if(e.ctrlKey && e.keyCode == 85) return false; // Ctrl+U
        }
